# Vibe 基础设施编排
# 仅 API 服务（MySQL 在阿里云 RDS，存储在七牛云，Nginx 由宿主机统一管理）

services:
  vibe-api:
    build:
      context: ../vibe-server
      dockerfile: ../vibe-infra/Dockerfile
    container_name: vibe-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - vibe-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vibe-net:
    driver: bridge
