# Vibe 生产配置 — 通过环境变量注入
# Docker 容器内使用此文件
# 支持语法: ${VAR} 和 ${VAR:-default}

server:
  port: ${SERVER_PORT:-8080}
  mode: release

database:
  host: ${DB_HOST:-127.0.0.1}
  port: ${DB_PORT:-3306}
  user: ${DB_USER:-root}
  password: ${DB_PASSWORD:-}
  dbname: ${DB_NAME:-vibe_db}
  max_idle_conns: 10
  max_open_conns: 100

storage:
  provider: qiniu
  access_key: ${QINIU_ACCESS_KEY:-}
  secret_key: ${QINIU_SECRET_KEY:-}
  bucket: ${QINIU_BUCKET:-}
  region: ${QINIU_REGION:-z1}
  domain: ${QINIU_DOMAIN:-https://static.yhugo.cn}
  use_https: true
  prefix: ${QINIU_PREFIX:-zywoo}

jwt:
  secret: ${JWT_SECRET:-change-me}
  expire_hours: 720

media:
  max_image_size: 20971520
  max_video_size: 524288000
  max_audio_size: 52428800
  thumbnail_width: 800
  video_target_resolution: 720

link_preview:
  timeout_sec: 5
  user_agent: "Vibe/1.0 LinkPreview Bot"

access_code: ${ACCESS_CODE:-vibe123}

ai:
  provider: ${AI_PROVIDER:-deepseek} # 当前启用：glm / deepseek
  max_tokens: 300
  temperature: 0.8
  timeout_sec: 30
  delay_seconds: 120
  providers:
    glm:
      api_base: "https://open.bigmodel.cn/api/paas/v4"
      api_key: "${GLM_API_KEY:-}"
      model: "glm-4-flash"
      vision: true
    deepseek:
      api_base: "https://api.deepseek.com"
      api_key: "${DEEPSEEK_API_KEY:-}"
      model: "deepseek-chat"
      vision: false
