# Vibe 基础设施编排
# 仅 API 服务（MySQL 在阿里云 RDS，存储在七牛云，Nginx 由宿主机统一管理）
#
# 镜像由 GitHub Actions 自动构建并推送到 GHCR
# 服务器只需 docker compose pull && docker compose up -d

services:
  vibe-api:
    image: ghcr.io/youngcc2/vibe-server:latest
    container_name: vibe-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3011:8080"
    networks:
      - vibe-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vibe-net:
    driver: bridge
