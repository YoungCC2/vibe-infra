# Vibe API 反代配置 — 宿主机 Nginx 使用
# 将此文件复制到宿主机 Nginx 的 conf.d 目录（通常为 /etc/nginx/conf.d/）
# 并根据实际情况修改 server_name 和 SSL 证书路径
#
# 安装步骤：
#   1. cp vibe.conf /etc/nginx/conf.d/
#   2. 修改 server_name 为你的域名
#   3. 修改 SSL 证书路径（如使用 Let's Encrypt，见 ssl.sh）
#   4. nginx -t && systemctl reload nginx

# --- HTTP → HTTPS ---
server {
    listen 80;
    server_name YOUR_DOMAIN;  # ← 改成你的域名

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS API ---
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;  # ← 改成你的域名

    # SSL 证书（Let's Encrypt 默认路径，按需修改）
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header X-Frame-Options DENIED always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 上传大小（图片 20MB / 视频 500MB）
    client_max_body_size 600m;
    client_body_timeout 120s;

    # API 反代到 Docker 中的 vibe-api
    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 上传超时
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # WebSocket 支持（预留）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 健康检查
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:3011/api/health;
    }
}
