# Vibe 基础设施编排
# 仅 API + Nginx（MySQL 在阿里云 RDS，存储在七牛云）

services:
  vibe-api:
    build:
      context: ../vibe-server
      dockerfile: ../vibe-infra/Dockerfile
    container_name: vibe-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"   # 只监听本地，由 Nginx 反代
    networks:
      - vibe-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  vibe-nginx:
    image: nginx:1.27-alpine
    container_name: vibe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - vibe-api
    networks:
      - vibe-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vibe-net:
    driver: bridge
